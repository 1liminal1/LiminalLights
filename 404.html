<!DOCTYPE html>

  <style>
    .error-section {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--spacing-xl) var(--spacing-md);
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: var(--accent-blue);
      line-height: 1;
      margin-bottom: var(--spacing-sm);
    }
    .error-section h1 {
      font-size: 2rem;
      color: var(--text-primary);
      margin-bottom: var(--spacing-sm);
    }
    .error-section p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: var(--spacing-md);
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-links {
      display: flex;
      gap: var(--spacing-sm);
      justify-content: center;
      flex-wrap: wrap;
    }
    .error-links a {
      color: var(--accent-blue);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent-blue);
      border-radius: var(--border-radius);
      transition: all 0.3s ease;
    }
    .error-links a:hover {
      background: var(--accent-blue);
      color: var(--bg-primary);
    }
  </style>
